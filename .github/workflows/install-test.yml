name: install-test

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'GitHub repo to install from (owner/name)'
        required: false
        default: 'fanfeilong/xgoup'
      version:
        description: 'Release tag to install (e.g. v0.1.0) or "latest"'
        required: false
        default: 'latest'
  push:
    paths:
      - 'scripts/install.sh'
      - 'scripts/install.ps1'
      - '.github/workflows/install-test.yml'
  pull_request:
    paths:
      - 'scripts/install.sh'
      - 'scripts/install.ps1'
      - '.github/workflows/install-test.yml'

permissions:
  contents: read

jobs:
  unix:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install (macOS/Linux) via curl | bash (README)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          raw="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}"
          curl -fsSL "$raw/scripts/install.sh" | XGOUP_GITHUB_REPO="${{ inputs.repo || 'fanfeilong/xgoup' }}" XGOUP_INSTALL_VERSION="${{ inputs.version || 'latest' }}" GITHUB_TOKEN="${GITHUB_TOKEN}" bash

      - name: Install (macOS/Linux) via wget | bash (README)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          raw="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}"

          if ! command -v wget >/dev/null 2>&1; then
            if [[ "${RUNNER_OS}" == "macOS" ]]; then
              brew update >/dev/null
              brew install wget
            else
              sudo apt-get update -y
              sudo apt-get install -y wget
            fi
          fi

          wget -qO- "$raw/scripts/install.sh" | XGOUP_GITHUB_REPO="${{ inputs.repo || 'fanfeilong/xgoup' }}" XGOUP_INSTALL_VERSION="${{ inputs.version || 'latest' }}" GITHUB_TOKEN="${GITHUB_TOKEN}" bash

      - name: Verify (macOS/Linux)
        shell: bash
        run: |
          set -euo pipefail
          bin="$HOME/.xgoup/bin/xgoup"
          echo "Bin: $bin"
          test -x "$bin"
          "$bin" --version

  windows:
    strategy:
      fail-fast: false
      matrix:
        shell:
          - pwsh       # PowerShell 7+
          - powershell # Windows PowerShell 5.1
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xgo (Windows)
        if: github.event_name != 'workflow_dispatch'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          # Download a full XGo distribution zip and set XGOROOT explicitly.
          $headers = @{
            "Accept" = "application/vnd.github+json"
            "User-Agent" = "xgoup-ci"
          }
          if ($env:GITHUB_TOKEN) {
            $headers["Authorization"] = "Bearer $($env:GITHUB_TOKEN)"
          }

          $rel = Invoke-RestMethod -Uri "https://api.github.com/repos/goplus/xgo/releases/latest" -Headers $headers
          $tag = [string]$rel.tag_name
          if (-not $tag) { throw "failed to resolve goplus/xgo latest release" }
          $ver = $tag.TrimStart('v')

          $arch = $env:PROCESSOR_ARCHITECTURE
          if ($env:PROCESSOR_ARCHITEW6432) { $arch = $env:PROCESSOR_ARCHITEW6432 }
          $arch = $arch.ToLowerInvariant()
          $arch = if ($arch -in @("amd64","x86_64")) { "amd64" } elseif ($arch -eq "arm64") { "arm64" } else { throw "unsupported arch: $arch" }

          $asset = "xgo$ver.windows-$arch.zip"
          $url = "https://github.com/goplus/xgo/releases/download/$tag/$asset"
          Write-Host "Downloading xgo: $url"

          $zip = Join-Path $env:RUNNER_TEMP $asset
          curl.exe -fsSL $url -o $zip

          $xgoDir = Join-Path $env:RUNNER_TEMP "xgo"
          if (Test-Path $xgoDir) { Remove-Item -Recurse -Force $xgoDir }
          New-Item -ItemType Directory -Force -Path $xgoDir | Out-Null
          tar -xf $zip -C $xgoDir

          # xgo.exe should be at xgoDir\xgo.exe, and XGOROOT should be xgoDir.
          $xgoExe = Join-Path $xgoDir "xgo.exe"
          if (-not (Test-Path $xgoExe)) {
            # Some archives may nest; locate it.
            $xgoExe = (Get-ChildItem -Path $xgoDir -Recurse -File -Filter "xgo.exe" | Select-Object -First 1).FullName
          }
          if (-not $xgoExe) { throw "xgo.exe not found after extraction" }

          $xgoBinDir = Split-Path -Parent $xgoExe
          $xgoroot = if ((Split-Path -Leaf $xgoBinDir) -ieq "bin") { Split-Path -Parent $xgoBinDir } else { $xgoBinDir }
          Write-Host "xgo: $xgoExe"
          Write-Host "xgo bin: $xgoBinDir"
          Write-Host "XGOROOT: $xgoroot"

          $env:Path = "$xgoBinDir;$env:Path"
          Add-Content -Path $env:GITHUB_ENV -Value "Path=$env:Path"
          Add-Content -Path $env:GITHUB_ENV -Value "XGOROOT=$xgoroot"

      - name: Build xgoup-init.exe (Windows)
        if: github.event_name != 'workflow_dispatch'
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"
          $out = Join-Path $env:RUNNER_TEMP "xgoup-init.exe"
          Push-Location ".\\scripts\\windows\\xgoup-init"
          try {
            xgo build -trimpath -ldflags="-s -w" -o $out .
          } finally {
            Pop-Location
          }
          Write-Host "Built: $out"

      - name: Install (Windows / pwsh) via xgoup-init.exe (README)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        env:
          XGOUP_HOME: ${{ runner.temp }}\xgoup-pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          Write-Host "Shell: $($PSVersionTable.PSVersion)"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $exe = Join-Path $env:TEMP "xgoup-init.exe"
            $url = "https://github.com/${env:GITHUB_REPOSITORY}/releases/latest/download/xgoup-init.exe"
            Write-Host "Installing via: $url"
            curl.exe -fsSL $url -o $exe
          } else {
            $exe = Join-Path $env:RUNNER_TEMP "xgoup-init.exe"
            Write-Host "Installing via built exe: $exe"
          }
          & $exe -repo "${env:GITHUB_REPOSITORY}" -version "${{ inputs.version || 'latest' }}" -modify-path=false

      - name: Verify (Windows / pwsh)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        env:
          XGOUP_HOME: ${{ runner.temp }}\xgoup-pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $bin = Join-Path $env:XGOUP_HOME "bin"
          Write-Host "Bin dir: $bin"

          if (Test-Path (Join-Path $bin "xgoup.exe")) {
            $cmd = (Join-Path $bin "xgoup.exe")
          } elseif (Test-Path (Join-Path $bin "xgoup.cmd")) {
            $cmd = (Join-Path $bin "xgoup.cmd")
          } else {
            throw "xgoup not found in $bin"
          }

          $out = & $cmd --version 2>&1
          $code = $LASTEXITCODE

          $text = ($out | Out-String).Trim()
          Write-Host $text
          Write-Host "Exit code: $code"

          if ($text -match 'xgoup(-windows-wrapper)?\s+\S+') {
            exit 0
          }

          throw "Unexpected output from --version (exit=$code): $text"

      - name: Install (Windows / powershell) via xgoup-init.exe (README)
        if: matrix.shell == 'powershell'
        shell: powershell
        env:
          XGOUP_HOME: ${{ runner.temp }}\xgoup-powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          Write-Host "Shell: $($PSVersionTable.PSVersion)"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $exe = Join-Path $env:TEMP "xgoup-init.exe"
            $url = "https://github.com/${env:GITHUB_REPOSITORY}/releases/latest/download/xgoup-init.exe"
            Write-Host "Installing via: $url"
            curl.exe -fsSL $url -o $exe
          } else {
            $exe = Join-Path $env:RUNNER_TEMP "xgoup-init.exe"
            Write-Host "Installing via built exe: $exe"
          }
          & $exe -repo "${env:GITHUB_REPOSITORY}" -version "${{ inputs.version || 'latest' }}" -modify-path=false

      - name: Verify (Windows / powershell)
        if: matrix.shell == 'powershell'
        shell: powershell
        env:
          XGOUP_HOME: ${{ runner.temp }}\xgoup-powershell
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $bin = Join-Path $env:XGOUP_HOME "bin"
          Write-Host "Bin dir: $bin"

          if (Test-Path (Join-Path $bin "xgoup.exe")) {
            $cmd = (Join-Path $bin "xgoup.exe")
          } elseif (Test-Path (Join-Path $bin "xgoup.cmd")) {
            $cmd = (Join-Path $bin "xgoup.cmd")
          } else {
            throw "xgoup not found in $bin"
          }

          $out = & $cmd --version 2>&1
          $code = $LASTEXITCODE

          $text = ($out | Out-String).Trim()
          Write-Host $text
          Write-Host "Exit code: $code"

          if ($text -match 'xgoup(-windows-wrapper)?\s+\S+') {
            exit 0
          }

          throw "Unexpected output from --version (exit=$code): $text"

