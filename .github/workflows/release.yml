name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          if [[ -z "$version" ]]; then
            echo "version is empty" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          dist="dist"
          mkdir -p "$dist"

          # Unix artifacts (script payload)
          for os in darwin linux; do
            for arch in amd64 arm64; do
              name="xgoup-${version}-${os}-${arch}"
              stage="$(mktemp -d)"
              cp bin/xgoup "$stage/xgoup"
              chmod +x "$stage/xgoup"
              tar -C "$stage" -czf "$dist/${name}.tar.gz" xgoup
              rm -rf "$stage"
            done
          done

          # Windows artifact (wrapper payload)
          win_stage="$(mktemp -d)"
          cp scripts/windows/xgoup.ps1 "$win_stage/xgoup.ps1"
          cp scripts/windows/xgoup.cmd "$win_stage/xgoup.cmd"
          (
            cd "$win_stage"
            zip -q "$GITHUB_WORKSPACE/$dist/xgoup-${version}-windows-amd64.zip" xgoup.ps1 xgoup.cmd
            zip -q "$GITHUB_WORKSPACE/$dist/xgoup-${version}-windows-arm64.zip" xgoup.ps1 xgoup.cmd
          )
          rm -rf "$win_stage"

          # checksums
          (
            cd "$dist"
            : > checksums.txt
            for f in xgoup-*; do
              sha256sum "$f" >> checksums.txt
            done
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
