name: windows-install-test

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'GitHub repo to install from (owner/name)'
        required: false
        default: 'fanfeilong/xgoup'
      version:
        description: 'Release tag to install (e.g. v0.1.0) or "latest"'
        required: false
        default: 'latest'
  push:
    paths:
      - 'scripts/install.ps1'
      - '.github/workflows/windows-install-test.yml'
  pull_request:
    paths:
      - 'scripts/install.ps1'
      - '.github/workflows/windows-install-test.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run installer (local script)
        shell: pwsh
        env:
          XGOUP_GITHUB_REPO: ${{ inputs.repo || 'fanfeilong/xgoup' }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $version = "${{ inputs.version || 'latest' }}"
          Write-Host "Installing repo=$env:XGOUP_GITHUB_REPO version=$version"

          pwsh -NoProfile -ExecutionPolicy Bypass -File ".\scripts\install.ps1" -Version $version

      - name: Verify install
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $bin = Join-Path $env:USERPROFILE ".xgoup\bin"
          Write-Host "Bin dir: $bin"

          if (Test-Path (Join-Path $bin "xgoup.exe")) {
            & (Join-Path $bin "xgoup.exe") --version
          } elseif (Test-Path (Join-Path $bin "xgoup.cmd")) {
            & (Join-Path $bin "xgoup.cmd") --version
          } else {
            throw "xgoup not found in $bin"
          }
